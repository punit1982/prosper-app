[theme]
primaryColor = "#1E88E5"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[server]
maxUploadSize = 50
headless = true
enableCORS = false
enableXsrfProtection = true

[runner]
magicEnabled = false
fastReruns = true

[browser]
gatherUsageStats = false

[global]
suppressDeprecationWarnings = false
