[theme]
primaryColor = "#1E88E5"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[server]
maxUploadSize = 50
headless = true
# Streamlit's enableCORS is inverted vs. generic web servers: "true" means
# RESTRICT to same-origin (which we want), and is also REQUIRED for XSRF
# cookie protection to work. Keep both true.
enableCORS = true
enableXsrfProtection = true

[runner]
magicEnabled = false
fastReruns = true

[browser]
gatherUsageStats = false

[global]
suppressDeprecationWarnings = false
