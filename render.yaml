# Render Blueprint — one-click deploy for Prosper
# https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: prosper
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /_stcore/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: PROSPER_AUTH_ENABLED
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PORT
        value: "8501"
